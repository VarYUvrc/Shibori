name: Release Shibori

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x
      - name: Restore
        run: dotnet restore Shibori.sln --runtime win-x64
      - name: Publish
        run: >-
          dotnet publish src/Shibori/Shibori.csproj --configuration Release --runtime win-x64
          --self-contained true --no-restore
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None -p:DebugSymbols=false
      - name: Package
        shell: pwsh
        run: |
          $publish = "src/Shibori/bin/Release/net8.0-windows/win-x64/publish"
          $staging = "staging/Shibori-win-x64"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "$publish/Shibori.exe" $staging
          Copy-Item LICENSE $staging
          Copy-Item THIRD-PARTY-NOTICES.md $staging
          Copy-Item README.md $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "staging/Shibori-win-x64.zip" -Force
          Copy-Item "docs/RELEASE.md" "staging/release-notes.md"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" staging/Shibori-win-x64.zip --repo "${{ github.repository }}" --title "Shibori ${{ github.ref_name }}" --notes-file staging/release-notes.md
